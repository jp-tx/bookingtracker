version: '3.8'

services:
  bookingtracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookingtracker
    ports:
      - "5000:8080"
    volumes:
      - ./data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=DataSource=/data/bookingtracker.db;Cache=Shared
      - DataDirectory=/data
      - ADMIN_EMAIL=admin@bookingtracker.local
      - ADMIN_PASSWORD=ChangeMe123!
      - ALLOW_REGISTRATION=true
    restart: unless-stopped
